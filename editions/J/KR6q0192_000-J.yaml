body:
  text: 序居士而荷擔法任者于迦文之世有淨名於達磨之世有楊衒之於馬祖之世有龐蘊宋元以來名卿哲匠或奕葉相承或拳踢互應語載傳燈僧史昭昭然不可誣也其卓然而傑出者如何密菴付法田素菴素菴付法緇流衣缽相繼七葉而愈光蓋佛祖之所重者在法法之所在雖總持尼凌行婆俞道婆輩舉足以顯揚提唱為千古偉人至今存其語言如金鎖玄關得其蘊者謂之真參實悟稍一疑滯則銀山鐵壁聳之面目前矣此無依道人之所以承先啟後獨擅美於今日也道人為世名儒腹笥百城風範一世牙軸之嚴整子裔之誦傳鄴架王庫殆不是過及其棄公車而圖佛乘若將以天假之年為法門作于城者備美之地必言到而行隨之富有日新孳孳不倦宜其法源壽域岌嶪汪洋矣道人多著述辯博典故則有鑑燦芳摹諸書宣揚教海則有法華金剛諸註游泳藝林則有孔孟周易諸解流演宗乘則有指南醒世諸刻莫不珠燦玉輝洞徹源底至于無依一錄則道人之現居士身而闡揚少室不傳之祕者故其為語去華存實去囂存樸不然博雅如道人豈不能剪削雕刻為趙華葉龍以衒燿人耳目如近代之宗匠云哉道人蓋深悉大法之不在形言不過聊為指注以廣化同流耳于是更念授受之不可自我而斬然也垂絲擲釣乃有衝浪如錦鱗然者故慨然以千鈞之任付之道人可謂不負佛祖與本師而為傳燈會中人矣行見燈光剎影亙世無窮又豈特密菴之七葉而已時大清康熙歲次丁未七月既望南村嗣祖沙門僧鑑拜撰
