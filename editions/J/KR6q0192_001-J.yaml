body:
  text: 武原無依道人徐昌治覲周甫著南村釣雪氏僧鑑刪定嗣法比丘超悟錄付法始末此道人自敘其入道之由與付法之所源起也道人為老參鉅儒文集而外有語錄語錄得法後之所著述也故敘道人錄者始之以付法之顛末而偈與頌次之敘與誌又次之書與記又次之故凡語句之無關於佛乘者概不與錄而道人汲汲為法之心于是乎純一不雜即為道人之後者亦可知所取法矣僧鑑題余自少至壯日以佞佛禮僧為第一義而未嫺于法迨戊辰隨僧濟公謁密雲老人命名通昌時老人王化金粟法道初闢予雖聞提撕茫茫不知落處閱己巳庚午老人出山石車禪師嗣之此年余始齋僧施茶石師時過余荷其策勵一啟口皆鉗鎚雖不能洞曉然心未嘗不殷殷嚮往也相與七閱春秋如同一日石師順世法堂席虛戊寅秋因率諸檀護公請本師費隱老人繼席冬杪即有查姓偷葬粟山頂一事鄰近百人眾共擊逐遂遷怒寺僧鳴官彺逞費老人曰堂頭事也與眾何預單身對簿適大雨余冒濕拉同袍挈庠友代白署篆魏公祖魏躬迎本師入賓館有加禮焉狀牌立銷次聞府間有行余入禾謁當事一一冰釋叢林鞏而法幢振此實始基之己卯密老人以天童事故出山抵白下予致書寧波馬總臺為之婉達諸當道語載致馬書中事既調攝老人擬歸天童路經禾于余隨本師往迎蒙入金粟山聚談數日受命輯闢邪集一帙老人蓋深知昌之衷曲素直故以此書委托如此庚辰冊務浩繁本山飯僧田暨寺基約百畝余集收字圖七甲代為免役壬午大荒余手捧缽盂募糧募金殫厥心力所獲既豐稍稍活眾癸未猶未稔也勸緣如之甲申助買南房數間助買園地二畝年齋僧二次乙酉迄丁亥本師赴天童請百師處首座寮為弋人所慕戊子有不利老人者浪傳金粟為天童下院老人不平不遠千里親詣金粟徹底澄清余于氣勝者調以禮義勝者浹以道彼此矛盾便休余力議嘗住不可一日無主遂率眾檀護合愛憎共筮之韋天得百癡禪師繼席焉本師因有不遇明公威德重幾乎梵宇草芊芊之贈嗣寧波歉收天童窘食四方餉饋皆余一人遍叩鎮官護送開船搜搶雖至毫末不動此蓋明明天助非人力也又有達人作用不尋常手眼高明見大方之贈庚寅余壽老人于福嚴相訂同遊雲間約略五燈正續蓋五燈一書自紹定至今四百餘祀纂修無人僧史闕略老人遠溯迦文以至己身輯彙成書顏曰嚴統命百癡兄董其事而予與同門李公士材實始終之復苦刻資莫繼其續燈五卷二百二十餘葉余獨力刻成辛卯秋一友以乃公曾售田金粟拉知戚與百師議贖余曰君之父產不可棄獨不為百師地乎此田百師祖業也亦當相體權宜者內取六畝退作加價畢竟虧損常住于心弗安余將附近金粟田六畝補之事雖名為常住實所以安百師也後百師以他客行諜拂衣出山違予初心故田亦不補百師出山後法道凌夷而此山遂成郵遞裨販所矣壬辰暮春費本師過余集米百石余送至徑山盤桓七日古今機緣頗多商確因嚴統未竣又助刻正本百葉及著徑山志序老人喜而賜杖且銘諸杖曰覿體現前描畫不得妙運超方了無群惑指點人間疏通正脈又書贈曰立地頂天一丈夫儒宗釋典旨相符年來體道深深喜宜把瞿曇擔子扶余婉笑辭曰高天厚地之恩敢同木石竊念閉門造車出門合轍謬許肩荷幸脫羅籠老人欣然曰不惟其名惟其實便是竿頭更進處遂贈一號號無依道人嗣後益蒙垂注辭之不得至丙申春仲於虞山維摩室中受付囑焉偈頌余晚年入道宜綮自修遇古人之善言懿行有合於本分中者時為拈頌以自寫所得雖不敢名為了手亦不甘自蒙蔽以少昧其生平故自得法以至今日即茹齋盟佛分置家業與諸兒輩存此已往之年以報佛恩宣法化更不復預人間事矣偈與頌雖不文姑存以正諸同志者脫家斷情須鐵漢勘破爐中雪欲了何時了一決罔不決釣雪鑒曰截鐵斬釘手親眼辦非大了當人不能作此語他日續傳燈而集著作只此偈可當之分家示五兒初祖一花開五葉予家內外喜同轍庭前各衍舊風雲笑傲乾坤展大業百癡元曰西來大意人人有誰家灶內火無煙參學了知佛法無多子切莫依稀辨朱紫說到無言可說處當天明月非關指百癡元曰悟真言的大有過人處護法法周沙界賴人傳遍地紅爐熾火然更藉添薪蓮社侶人人出手護真禪釣雪鑑曰不惟自護且教人護佛法從此不衰矣本師輯五燈頌以記之不分東土與西天法脈相承那用參有正有旁須驗過當前一指是司南天王傑出又天皇南嶽青原各續芳撥轉雲礽當日謬於今正派凜如霜薪傳燈續信奇哉明眼應須契本來瞿老非前今豈後任人衍法任人開五峰金粟出天童缽缽相承奕葉隆透得室中無味話曹溪未到路先通費老人曰大有衲僧氣概和普明禪師牧牛圖頌未牧頭角未露一聲哮自在縱橫去路遙黑白始分牝牡相生來柔順長靈苗初調順性今朝也受穿何煩童子又加鞭繩頭在手隨時轉到處風光不用牽受制踏著溪山便騁馳朝行暮宿緊相隨休貪水草東西路奔走能生兩足疲回首捩穿鼻孔始回頭不是天生稟性柔早晚加鞭還策勵煙雲客路莫停留馴伏不分內外與中邊束縛無拘意灑然信步行來皆坦道騰騰任運漫勞牷無礙萬別千差性本如超群惟此總無拘一身負荷皆全力本分何曾有欠餘任運息肩還得臥雲中渴飲饑餐處處同物我盡捐知解淨本無南北與西東獨照法外無心心亦閒不留轍跡在人間揚眉瞥爾開雙眼炤徹銀山鐵壁關雙泯隔墻清聽絕無蹤形影孤寒照碧空但見皇封成一片稼苗不犯草叢叢釣雪鑑曰提唱本分顯露日久功深一此不懈覲翁其真牧牛者與梁山普明大有知音矣閱世有感人世難逃受苦煎那從火裏蔚青蓮瞥然充溢天池水遍界光華享大年次韻示諸禪客滿眼祥光礙膺絕塵勞堪嘆沒休歇三三兩兩氣吞吳各吐珠璣如落葉贈金粟百禪師即次前韻煆煉紅爐火不絕一丹到手群情歇等閒拈出好風光抹殺西來駕一葉除夕世途擾擾竟何之欲了弗了了亦癡箇事不隨華歲去剎那千載阿誰知歲朝萬古恆嘗一旦新物華搬運舊時春韶光雖向人情換不識何人契本真元旦步沈菁莪韻紛紛慶賀古今然孰溯清流返濁泉獨有達人明本質歲華不改永堯年四威儀山中行八十氣盈盈略彴分明都歷過後架洗腳別有因山中住面壁意專注階前立雪安心時風吹壒𡒁歸何處山中坐瑞草敷猊座法輪轉展樹下垂一指拈花真笑破山中臥雞足何時寤袈裟守護百千年覆去翻來獨唱和釣雪鑑曰四威儀頌石屋高峰錄中有之蓋林下人工夫無處不在故作此以驗其底蘊也覲翁年甫九十而不衰更能于日用中檢點若此且其為語儼然本色老衲湔滌文人習氣殆盡非工夫純粹者詎易臻此胡宣子詰祝仲基本分內有偈無偈話草答偈到忘言思慮絕不通一線怎休歇試看曉日麗中天光明何處不漏洩又有無不爭好與醜本分豈人所拘守單刀直取顏良頭百萬軍威都了手望日遲明光射帳中非是月禪機達旦轉超越參得心空及第歸何如不第且休歇無依道人昌傳南嶽正宗三十五世費隱容老和尚法自丙申以來參透自己無悟無迷為法求人如饑如渴肩擔十年靡刻弛遇緣一旦始欣傳徹見綠野上人諱超悟誠信端愨寸步罔越謹守既有餘恢拓無不足遂以拂子一握囑以表信偈云佛祖淵源流脈長燈燈續焰法輪揚探籌從不分緇素甘露重開轉澤梁又勉勵一首遍野郊園有腳春綠雲靜靄任天真身膺法道無餘事力挽頹風是至人和吳萬為誦百和尚出山韻去來何用毒相攻室內操戈總是空曳屨飄然擎日月達人何處不潛蹤堪笑時人眼不開妄仇龍象攪獅臺佛家自有安身法枉伴浮棺去復來粟山延藏百餘年經到俄聽有訕傳共爾一身為去住情狂端不識真禪是日予適請藏經至雲跡深藏匝竹菴祥光紫氣遶澄潭宗風動地無高下瓢笠隨身有指南百師時憩錫梵勝菴孤雲兄繼百和尚住持金粟作偈相招次韻答意忭舞清規高百丈驚聞洒掃舊苔痕風光到處皆流映莫使孤輪旦復昏答蔡子榖送木老法叔入院偈金粟堂中老國師陽春賡唱正其時當年同調今非昔早不推心漫怨遲附原偈大唐國裏無禪師花發優曇古佛時孤掌何如雙拍板秦溪擊楫勿遲遲頌本師費老人道脈千秋仗仔肩光輝遍界我翁宣蓋天蓋地奇男子亙古亙今大聖賢不誇神駿支林重已占蓬門竺國先從此相承師範遠英英繡虎解忘筌除夕次韻一年光景去如梭隔歲銅催又若何斗柄光從五夜轉書雲節又四旬過含元殿裏笙簧沸野老村中爆竹多獨有至人回造化此時也唱太平歌輓破顏和尚振鐸吾鄉十載餘婆心一片更誰如三秋猿哭秦峰冷一夜鴟鳴法席虛腳下仍多獅象侶寰中剩有水雲居依然此日瞻遺範腸斷魂銷孰念余輓百癡和尚等閒擲去杖成龍嘆息斯人不再逢佛法我慚張運使文章君是悅雲峰方欣念載知交舊詎意孤龕雲霧封剩對西風揮老淚昏衢光燭與誰共立夏日登凌霄峰踏遍松杉路側崎諸峰頂上摘芳蘺靈禽力弱蹤難到道叟情狂策縱隨洗硯池中弔蘇子碁盤石際探芝眉凌霄登盡空雙眼匝地宗風歷攬奇金粟百癡禪師曰詞端旨確骨古調清當與師川大年輩並垂不朽月影午夜流光光映身當頭照見人非人階前雲度添長蔭臺上花移舞短紳來去依稀漂白浪晦明彷彿露清神柳梢描出娑婆像斜望西樓焦兔真步潛夫李年兄梅花韻消息單傳雪嶺神繁華刊落露清真馨香一段含生意冰骨千秋顯出塵月夜欹斜疑碧漢壟頭疏放笑征人自從瞿老親拈後在在分明總是春步子建王年翁晴泛韻碧水韶光劈面開滄溟西泛一葦來吳山勝境翻新象春洞桃花麗舊苔寂歷禪心推拾得逍遙千古頌浮杯吮毫難寫坡堤意策杖還誇曼五臺拈頌釣雪鑑曰拈與頌唐宋諸大老舉有之張無盡托缽頌蘇長公上佛印頌計國夫人念經頌張拙秀才悟道頌大略不事雕飾直寫本色心印心法印法也他如圓悟之碧岩萬松之評唱言深意晦隱索深鉤使淺近人莫由窺其邊際無怪乎有少林提唱諸公從而義理之也覲翁學佛而能以平易之詞指示後學心法雙彰語默路絕真可與唐宋諸君子握手矣打牛即是打車即是公案頌云把柄都在手縱橫得自由𦆆纖俱淨盡何處覓車牛趙州勘破臺山婆子公案頌云婆勘阿師不在驀直州勘婆子不在臺山各勘本來面何曾別問津牽牛向谿東放不免食他國王水草向谿西放不免食他國王水草不如隨分納些些公案拈云本分一著一生受用不盡唯隨分而納方免非分而營自從胡亂後三十年不曾少鹽醬公案拈云將謂有本可據調羹尚少滋味在如人上樹口銜樹枝手不扳枝足不踏樹樹下有人問西來意不對則違他所問若對又喪身失命公案頌云句下無生忍臨機藉指南西來恁麼意開口告人難有句無句如藤倚樹樹倒藤枯句歸何處公案頌云擬議卻從言下起倚墻傍壁轉轉生直得有無雙遣葛藤斬盡馬前相撲一倒便休休休含元殿裏覓長安作麼今晚一覺睡來日是新年公案著云曙色未分人盡望及乎天曉也尋常果悟則一一不著問人而自明公案拈云千峰勢至嶽邊萬派聲歸海上是他家裏人方諳這般說話且道那箇是家裏人良久云又來問我那僧問慧力昌禪師云佛力法力即不問如何是慧力昌云踏倒人我山扶起菩提樹玉林別云喫官酒臥官街當處死當處埋木老人拈云高高山頂立還他慧力昌深深海底行須是我報恩法兄始得但一人入佛而不能入魔一人入魔而不能入佛老僧則不然山月如銀牽老興閒行不覺過溪西頌云識透上頭關鐵鞭都打碎呵呵呵人我不容立菩提何處栽魔佛亙古判優曇火裏開圜悟老人答大慧有句無句公案頌云描不成兮畫不就黑白分明絕體究相隨來也話更奇飛鳥歸巢各依舊禪如大海將缽盂盛得些子公案西江漫誇一口吸缽盂如何難測海不會箇中吞吐意忖度短長真可慨寫懷無手人打無舌人無舌人連忙道箇不必概觀僧俗兮暴殄真不必世趨如是兮冷眼亦不必別古泥佛宜度水蕩漾波光彼岸砥金佛宜度爐赤心片片印森羅木佛宜度火爍破乾坤炤今古覲周目趙州三不度予謂三宜度蓋古人委身飼虎懸崖畢命與夫析骨還父析肉還母俱以大休歇顯大神通則三佛之度正三佛之妙用云靜觀二首未生前事未生了未來後事未來了現在十方雲去去有何不了待人了世緣日日增百歲不能了識得無干涉自心先了了步韻贈禪堂雲菴姪物換時移不記年逆順從無兩樣天水平石出非無會雨驟龍翔別有緣羨侄番新品古宿節承訪舊話真禪垂手鬧市如山靜樹下閒行何不然和韻贈蓮社心源法師我昔親承瑞燭來蓮花三度火裏開自慚無德當靈應何意蓮社燦錦臺佛室輝煌呈彩色禪燈炫耀啟聖胎彌陀處處勤指引為報西方淨土階毒蛇世尊惡毒蛇阿難俱答顧來初問兩兩提撕情未瞥福堂追繹太分別不思本分真空體勤求儆語怎休歇乾矢橛矢橛何曾值半文將來擬議有何情佛法無多原平等濁自濁兮清自清庭前柏樹子眸迎柏子最分曉覿面相呈真湊巧佛本無前亦無後囫圇吞棗知者少和顧來初立夏送春韻歲序如梭去不留夏景初賁春未收冷暖雖向人情換衰旺豈因代謝愁密密生意隨時轉隱隱禪心始復周盡知梅蕊消息好誰道荷畔吐香稠代漚天法兄募米偈道高何慮生不辰休嘆禪和篾束身杖駕瓢囊光日月法弘遠近震天人塵塵歡喜開生面缽缽頻添賴巨仁莫謂一漚酬有限化躋光天遍屆春顧來初求不二門答云不二無門徑尋求亦無途自心能了悟復何一與多齋單覲周日語云人無壽夭祿盡則亡現前所見如乙未年王玄冶賈惺常賀仲嘿吳聖水及大侄伯玄同時相繼而歿此諸君子年尚可延食正饒裕而一時奪則奪之昔凝觀寺僧法慶開皇三年造夾紵釋迦立像高丈六功未畢慶遂卒其日有寶昌寺僧大智死經三日而甦白寺僧云於閻羅王前見法慶甚有憂色少頃見像來王前王遽走下階合掌禮拜此像像謂王曰法慶造我功未畢柰何令死王顧問一人曰法慶合死未答曰命未合終而食料已盡王曰可給荷葉俾終其福業大智甫說令於凝觀寺看之須臾之間遂見法慶甦活果甦後喜餐荷葉以為佳味及噉餘食終不得下像成之後數年乃亡如是莫大功德料盡則死轉給則生可見多食不如少食濃食不如淡食也予自丙子除暮侍立父側父云我睹此分歲品物件件欲得而啖之竟若不容我啖者予聞而刺心二十年如一日今於八月十五日靜室落成禮誦法華尊經梁皇寶懺告申茹素隨著四弗箴曰弗旨弗肥弗營弗暴庶幾哉弗求多便弗少弗求濃便弗淡無弗可以自勉無弗可以勉人正是紅燈焰焰空熒擾急急回頭早是遲日泞耕叟吳憲跋閱覲周居士此文勝閱雲棲戒殺七則因憶韓晉公滉有吏司冥錄一日對滉云凡人食料具有記籍二品以上日支五品以上旬支六品至九品季支平常人歲支滉詰以我明日所食幾何吏曰但不可洩漏食品已定遂密寫御前食糕腹脹黃昏啜橘皮湯二盞啟看一一不謬數之前定如此今人不能戒殺為口腹故然滋味於我至輕性命於彼甚重識得祿盡則亡四字尚敢再窮水陸恣殺業乎馬冏伯云昔萬羊丞相李德裕食至止少百羊遂戒殺偶人饋百烝羊雖堅辭竟數滿不祿勸勉內人并悼亡苦海無邊佛為度彼岸登兮孽不墮意中了了斷諸緣有何功德不負荷錦繡世界一時收逍遙路上別有秋大地山河包不盡個事承當永不休一生行履汝週旋笑談因果在目前登時撒手分別去留下福田事事全內助去矣我形單好比麻油樹上攤願汝會得祖師意隻亦陶然免涕潸
