body:
  text: 武原無依道人徐昌治覲周甫著南村釣雪氏僧鑑刪定門人弘量記録五燈嚴統序粵自三教行而禪道至今日甚盛矣然禪統至今日漸淆矣費隱本師有殷憂焉去秋未赴徑山時九月既望自福嚴抵禾招余同詣雲間館于小崑山房與士材李居士將舊本五燈推詳授受根究來繇抉從前之疑窟訂向後之信傳光明正大為開闢來佛教流通一大準則至洞宗如淨以後非無續刊然而影承響接較儒家之魯魚亥豕更甚流而至評唱訓詁之差訛咸得竊名正統殊增浩嘆余三人矢公矢慎溯源析流採集五卷皆百禪師苦心遍索手録成帙者比時深憂任事無人募資乏力余目擊心賞慨焉擔荷束卷南還輸金購梨鳩工寫劂旋到金粟與百師又加釐剔親為較讎朝催暮逼至春初竣業而後喜可知也共前翻刻計二十五卷總顏曰五燈嚴統茲秋孟徑山老人寄士材序文至閲之朗朗揭日足令售贋鼎者緘口余不諳且不文竊於命名至意不能默默而處於此何也西竺五印禪脈也東旦五葉禪宗也一分為五雖百千萬億會歸一元則正統當核五殽於一則建幢立法漸至不可思議則閏統當稽況別戶分門慮不無長短簧鼓則合而分分而合之統當辨夫核也稽也辨也皆嚴也嚴與刻相反而毋縱毋濫非我是人非以為嚴余幼習儒曾選刻歷朝鑑燦典則芳摹經書二指行世可不負儒長而從佛未登賢書之籍先廁密室之名亦為選刻諸經指南高僧摘要醒世録法華經卓解金剛經會解數集今費老人與百禪師前引後接左挈右提事事相扶心心相印箇中既通消息功名等若浮雲遂棄公車猛圖佛乘所以茲編合掌承當跂足立就執鞭從事以心之所欽樹天下萬世之防敢曰有功於禪庶幾不負禪云序徑山志壬辰新夏日書于雙徑留玉樓中天下名山惟徑山形勝鍾靈獨異天下古剎唯徑山叢林帝寵獨隆余素心慕未一登覽喜費隱老人主席茲山因五燈嚴統鳩工未竣過余相商鹽城之士大夫諸善信若赤子久失慈母各負米供養須臾而纍百石費老人曰歲儉荷蒙多助心殊弗安不五日而旋旆余不忍遽爾分袂一路伴行至檇李先大司馬元仗兄曾孫輩攀留齊嚫捐粟盈秉抵塘棲沈姓者裏糧以待縴纜而贈其至誠感人隨地輸將如此四舟銜尾梯航而濟亦不五日而入山但見諸峰環拱秀采迭呈夾道皆參天古木密布俱插地新篁蒼蒼欲滴翠翠若流勢似奔而紋回形似伏而神聳應接不暇靄色可餐將入門而群賢屏列于巖側及登堂而龍象交參于庭前余迤邐于後睹此肅肅威儀整整法幢而後知有其人而山始靈有其法而人始重非偶然也甫憩息間費老人持徑山志稿示余陡誦因具悉國一祖師欽開山時神龍獻地而井樹隆千古菩薩現形而巨石喝三塊代宗皇帝賜號禮同弟子名臣三十二皈依稱列門人德宗璽檄憲帝碑銘生而望隆九重沒而流風百世後雖名師輩出芳躅漸稀逮二十世而大慧禪師復振前徽為此山中興法主縉紳入室有無垢不動諸軒衲子坐夏計一千七百圍繞佛法冠天下聲名溢京師出山入山無改節賜紫賜號有餘裒綱要五冊詔入大藏卓哉盛事誰堪媲美幸元叟端禪師值至治壬戌徑山虛席宣政行院奏請補住璽贈金襴袈裟適道家言上章謁天帝為選徑山四十八代住持天閽不開正符其數師朝京夢山潭龍君持金匙舉食食師主法席十八春秋亦其讖也自茲南楚禪師而下月林禪師以上計八十七世歷唐宋來一燬于慶元己未住持元聰新之兩災于昭定癸巳淳佑壬寅無準禪師營之及雲妙高之世至元乙亥己丑疊火屢捐衣鉢悉力營搆盡更舊規稍稍安居明正德以後越今幾二百年主席不定宗乘久虛去來者等若傳舍負隅者認為故居茲順治庚寅費老人赴衆檀護之請來主斯席以實心行實事絶無人我是非以道力轉法輪具見超佛越祖目擊宗祖之逼處西偏也為之建祖堂于殿之左不忍碩德之無稱于後也為之建名宿堂于殿之右方丈窄隘創于殿東亦規模不得不如此初非居求廣也以山之靈振老人之法以老人之大機大用煥目前之五嶽凌霄法席有餘燠山色有餘輝座下英賢振鐸諸方大剎廣布聲施咸以祖宗真血脈滴滴流傳宜其開拓宏而垂休遠也余遍陟峻絶遠眺層峰不覺泫然淚下憶先君資善大夫星魯公年踰九旬時頌此山為佛窟而弗克躡足二先兄大司馬忠烈肩虞公拉余同游竟王事驅馳杳焉齎志余雖不顧身家疏聞當寧上贈下廕際此一游一不游能不撫心長嘆長兄光祿型唐公登眺尋龍胍高低俱置不道能臥游諸勝然兀坐蓬窗余儒而釋者也佛門大事外無大事竊欲以昔日靈山會為今日徑山會舉四十九年吞吐未盡之機緣仗費老人重重拈出余則以今日維世心印昔日維摩法舉八十七代住持已成之公案俾余不肖一一追扶近閲老人進山法語如追回臨濟家風捩轉列祖鼻孔尊宿當年如寶集無窮三昧潑空流等語不覺鼓掌大悅庶幾哉撐天立地于今見繼往開來永賴之謹序百和尚全部語録序宗門之語語法也正所以語心也蓋此心法不容擬議不容限量審時度節隨因溯緣或語地或語人或語語或不語語乃稱獨步者曹溪而上莫以喻其前頌開來者太白而下反若窄其緒而不知語雖不同心無二心法無二法也惟心法昭而筆墨皆生動齒頰皆馨香我法兄百翁悉備而光大之有才而若無才具識而若無識捷得心印而若一無所得廣傳賢聖而若一無所傳恂恂然一舉一動皆實心一咳一吐皆實意真不可語何嘗不語其似者似不可語何嘗必語其似者語所當語何嘗不語其真而似似而真者語所不當語何嘗必語其真非真似非似者總之千百年之血脈流傳于此一語千百世之肩荷弘護於此一語此而猶得謂一人之事業乎此而猶得謂一世之文章乎吾披閲再四爽焉若失西江之可以一口吸也茫茫大海亦復如是東山之可以小魯登也巍巍泰山亦復如是吾深羡其如是竟不知其何以如是建瓴之水萬里濯足倒峽之勢千仞振衣至於靜裏傳響冷地發焰尤在善解者迎其刃焉闢邪題詞余佩服儒教攻苦有年蓋通晝夜寒暑而行住坐臥于此中方以未得理道為憾忍聽邪說亂之也哉日兢兢焉以一善之得一隙之明急為傳布嘉與流通何帝典王謨名臣烈士貞夫節婦不一一表章于帙中迄上古中古當時君相豐功偉業咸密密裒崇于言外無非以大經大法迪人心而開人目使異說不得乘而中也偶於中秋偕費隱禪師連舟詣禾迎密老人見其案前所列諸書若痛斥夫邪教之以僞亂真貶佛毀道且授儒攻儒有不昭其罪洞其奸彰灼其中禍于人流害于世胥天下而膺之懲之不已者南有宗伯北有諫臣𠳿𠳿疏論其猾稽蠱惑之奸已稱直窮到底閩諸君子浙諸大夫侃侃糾繩夫以技衒巧以利誘愚口誅創異筆伐黨同何啻張膽明目至于雲棲有說密老有辨費師有揭邪之不容攛正也纚纚數千言佛與儒同一衛道之心矣費師又慮巧僞易滋除蔓匪細不合諸刻揭諸塗使人人警省在在聳惕焉能戶為說而家為喻因以數帙授昌治編其節次臚其條款列其名目一種憂世覺人之苦心洞若指掌一段明大道肅紀綱息邪說放淫詞較若列眉于中刪繁就簡去肉存髓凡一言一字可以激發人心抹殺異類有補于一時有功于萬世者靡不急録以梓百癡元曰追金琢玉字字光鮮溯本窮源言言慨切一以維持名教一以輔弼祖庭世道人心裨益豈淺淺哉子輿有言吾為此懼間先聖之道距楊墨放淫辭邪說者不得作於覲翁見之序雲濤集黃檗隱元禪師費老人法嗣也其悟道則有行繇其建幢則有語録不具論祗如負擔走天童登祖堂掃祖塔渡江而北詣金粟覲師不肖始得一接色笑見其巍巍器宇稜稜俠骨滿口珠璣遍體德業而後知身任道法者如山之峻如海之汪未易測度高深也未幾振鐸福嚴結茆為廬問道環堵不肖于庚寅夏壽費老人于此山而具悉其淡泊平易不擇地而引掖如此辛卯冬良上人捧師雲濤集募刻陡誦一字一真金一語一至寶如復轉檗庭之淒涼甘如飴倏焉盛大履如素點綴十二峰于紙上人得披卷而領略剖示十四景于目前隨在借喻以顯真此津梁筏也此指南訣也余喜而捐資相助成帙且為一序顛末凡寓目者幸弗以寄情適意為一時酬對選勝之書而作文字會則幾矣題靈師語録序捐金建菴供養大善知識者道真也命名直指廣示人心見性成佛者徑山老人也奉法惟謹守先待後而提唱宗乘者老人法嗣靈嶽禪師也余于鹽官領其披膈心為向往茲于雙徑接其謦咳益切神依似不能默默處此然而不能無慨于今日也有等認唾餘作生涯珍糞團為至寶辨髦一切我慢上人呵呵鼠喫貓兒飯推枕落地時活潑翻身轉一句半句從何著乃誇多鬥靡謬認見過于師不顧籌可入室而止取肘滿縱橫回思築拳脅下轉師黃檗者究成往事一似主伯家以亞旅為勝朋黨中以羽翼為先那知壯士展臂獅子游行渾身脫落漆桶底窗櫺怎過水牯牛接引一淆則龍蛇雜進若廟若祠盡做開堂勝地擎拳豎指便稱說法宗風承當既謬演法日卑嗚呼鴛鴦繡出從君看金針終不度與人遠之遠矣自此而依稀倣佛道場便滋圖利徇私外護如缶醯黃蚋聚之有酸盲以引盲僞以附僞彼此相蒙日淪污下祖庭誰為撐扶宗綱立見頽敗此皆旁蹊曲徑舉光明正大直截現前之道而故違之宜老人有概于中汲汲指點而菴稱其名靈師步趨其內舉揚箇事而名踐其實正是象王行處絶狐蹤一堂授受有的據也昔庖丁批卻導款一朝解十二牛而刃若新發于硎竊于靈師有厚望焉雖然余亦多此一番饒舌墻外鳥啼聲已碎盡在搖頭不語中是為序百癡元曰鬧熱時病中一帖清涼散序寫峰天下叢林皆善知識說法度人之地恬退者必藉靜室為憩息其未出山者亦每搆一椽創一址長養法幢嫻習矩矱為他日大行廣布之始基如示方法姪本師費老人之孫孤雲兄之子也建剎于鹽之北關外新篁密插古柏高擎梅環于左水流于右前有雉堞後有勺居東濱大海西峙浮圖毛父母寓目心喜題曰寫峰明明祇樹園而不寫明明舍衛城而不寫明明阿耨池而不寫明明竹林精舍而不寫而所寫者峰也豈以東南之秦駐稍遠西南之紫雲尚遙必欲東北起一層巒西北障一天塹而百鳥銜花之異竟在指顧間乎一峰而該千峰萬峰萬峰千峰而統于此一峰俱無暇論總之有竹有梅有泉有石界東藩為佛室邈西舍若雲居海濤與梵音同韻松風與林吼齊聲莫道閉門不是深山也釣雪鑑曰奇巧疊出是蘇黃小品中最佳處法華經卓解敘諸經皆修行軌則獨法華妙義殷殷開導殷殷示方便法門種種曉喻種種現接引神力務使未信令信未解令解未善生善已善增長豎窮三際橫亙十方在在醒人敬禮處處肅人遵奉借權顯實而實之真體躍躍在吐露間懸一通三而三之指歸隱隱在趨步外豫年屆八旬有五精力日憊資用日窘回思大恩未報駒隙空延急集法華諸論而天台智師之科注為詳師詮藏通別圓四教而藏中菩薩乘概隸為小不無遺議復檢清涼國師小始終頓圓五教揭其全宗細將七卷句為逗節為解一登繕帙便付剞劂倣昔賢豪秉燭夜遊之意亦俾速于披閲心目蚤豁如杲日麗天萬象靡不領其光荷其照此經分疏明了自軌軌他或得有功于法寶有益于人心有利于天下後世焉若介介擬議于如何妙法如何蓮華是不覷透本根徒枝尋葉摘奚補哉金剛經會解了義序豫於戊辰燕邸考授別駕時誦起金剛經閲今三十五載口為誦而心無解欲以不解解之初非此可解彼不可解又非有可解有不可解竊嘆義味何如是深奧究竟無淺如何有深無顯如何有奧大而世界此也細而微塵此也明明可舉似明明無可舉似繁而生類此也約而四相此也實實有係屬實實無所係屬法可說而法原無法併說亦無說物可度而物無其物併度亦非度上而授記無授記下而受持無受持中而演說四句偈無從而演說諸相不立歸于無我造作不生泯于無為總之無可住之法便無可住之心有住而無住之心即是不降而降之法故護念非不諄切而去來坐臥先無定付囑非不叮嚀而夢幻泡影誰是真豫遍搜諸解俱不過會文潔義尋章摘句爾已于其中煩者汰之訛者訂之晦者醒之倒者整之前後呼應者暢其詞虛實轉變者通其意謂直溯靈山會上覿面吐露覿面稟承世尊不說說須菩提不聞聞阿難結集于儼然未散時而會取當日情景余則何敢若以堅利喻金剛余則曰堅莫堅于此心利莫利于此信法之心心光即是佛光人人有現成般若證佛不如證心在在有捷徑六波羅蜜至于非名是名正第一義難形容處如云日出西方夜落東桃花雪白李花紅何獨不然資聖募建雲水房疏法門功德齊僧為上而接待行腳使至者如歸又齊僧中喫緊事近法兄破堂頭闡化延納四方參徒食訖即去以無安單也茲山東客僧傳正號淡菴目擊屋窄地寬發願叩募啓建數椽一以便雲遊往來一以專學人觀聽因此僧係先胞兄肩虞公巡撫山東時曾為屬吏遇亂長剃籍此功行以了夙緣浼豫辨首豫已住靜南郊一切付不聞不見因以此僧懇請之故及與破和尚來諭辭之不克聊為捉筆所謂供養百千諸佛不如供養無心道人特以告諸具眼者重建真如塔疏按忉利天城東有佛髮塔城西歡喜園中有佛鉢塔城中御駕園中有佛牙塔至阿育王造八萬四千塔敕閻浮提及于海際城邑聚落滿一億家者即為立塔此時欲得舍利供養遂將四部兵衆至王舍城取阿闍世王佛塔中舍利又取七佛塔中舍利以金銀琉璃玻璃筐盛之復作八萬四千寶瓶以盛此筐從來舍利有三種骨舍利色白髮舍利色黑肉舍利色赤後孫權時沙門康僧會極言舍利應現無方權曰何在會曰佛神跡感通祈求可獲權即委會求經三七日至誠禱請遂獲瓶中旦呈于權光照宮殿權執瓶瀉于銅盆舍利下衝盤即破碎權大驚異會曰佛之靈骨金剛不朽劫火不焦槌砧不碎權使力者盡力擊之槌砧俱陷舍利不損光明四射以是知建塔難得舍利又難今又節法師重建真如塔殫思締造四層工程浩大又三處得舍利五顆因緣巧湊出自天助豈人力哉丙申春仲詣鹽西林菴開講楞嚴尊經募諸善信隨緣喜捨以竟前功洵是垂絲千尺鉤還曲利物多方語帶悲若不體究說法本意恐說者說到盡未來際也說不了即聽者聽到盡未來際也聽不了故行到水窮處還當坐看雲起時願令如幻如夢之衆特發如饑如溺之心圓成如金如剛之塔方為烈焰堆中撈得月否則趨向真如亦是邪釣雪鑑曰文節只造一座塔覲翁便現出種種塔樣文節以土木瓦石為塔覲翁以筆墨心華為塔且道誰優誰劣具眼者試定當看塔塘橋序聞之檀那六度利濟為最上乘故造殿裝佛雖不漏因非見世事繄渡口灘頭絶流斷岸雨夕風辰黃昏午夜行人天塹倣徨苦海所謂人天路上現前功德惟此特著矧塔塘橋匪僻處一隅鹽邑抵郡固取道而七壤萬靈率由利涉陡然缺陷插翅勿能胥溺是懼此住持道人海澄宏願遹新弗憚五體投地借筏彼岸也我父侯快閣劉公俠骨慈腸生秉慧根性具上器規政罔不嘉惠氓庶此舉慨俞所請捐廉為厥指南俾衆生同脫迷津悉躋覺路則又不寧嘉惠余鹽將闔郡諸壤咸利賴焉余慚襪線能弗仰崔嵬以足高瞻沆漭而神遠乎頃歲凶粟踊朝夕不遑余亦何敢向窶子為不情語語夫素封家與其積之不散何如擲其必朽造乃無量昔人竹橋渡蟻食報鼎甲夫蟻猶異類善且天知救我血氣膚髮更當什伯雖然即不食報見險道化金城沙界盡攸往必多歡喜趣然則宰官居士隨其産力或出金錢或輸子粒共作歡喜想雖寶筏金繩篾以加茲余不文為募引緣亦推廣父侯德意而為大衆勸併為海澄道人勸但得己心堅似鐵他心雖鐵也須穿送寧波總戎馬冏伯書老親翁榮轉南中督府方出奠海國旋入衛邦都事業文章古今來不少概見弟辱在最契雀躍胡可言喻未審何日錦旋弟當走武林道傍摳迎把晤茲有啓者弟月之望于禾干晤天童密雲老和尚談及老親翁崇禮護法稱誦謂再來人近因彼處一士夫不合飄然出游曾無繫戀今又為海道王老公祖慰留肫懇使命交臨各邑鄉紳致郵盈案和尚慈悲忽發歡然就衆請焉總之有道之人去從皆理喜怒無私弟皈依已久知莫可效讚嘆但願台駕將發時一俯臨其地便足重山靈至若挽轍之道臺乞揄揚其休美勸其永作鎮護更望台晤撫臺備言和尚之品行與化導委委王法佛法相為表裏使秉鉞者亦起敬心一二鑠金遂不得乘而中焉老親翁之種福與維持調護者而俱深也弟一腔熱血不覺言之娓娓木老人北遊集中上問老莊悟處與佛祖為同為別老人云佛祖明心見性老莊所說未免心外有法古人判他為無因濫同外道上云孔孟之學又且何如老人云中庸說心性而歸之天命與老莊大段皆同豫因衆議稍窒致書老人乞將段皆二字易不相二字便見孔孟與老莊大不相同老人復書不納針云世上皆知孔孟不可及豫一人何苦為他出氣爭箇落處諄諄尋孔孟落處那如汲汲諦審自己落處況天地開闢三教並興道本一致教立殊途游夏不能贊一詞豫又何必置一喙有不明處不妨疑著有不到處不妨歇著種種辨說種種枝節釣雪鑑曰凡人不識自己所以不識孔孟不識孔孟所以離枝脫節并不識佛祖矣三復覲翁語使人眉舒神豁辛丑年紀事繼和尚之住金粟也殉一人之見不謀于衆不聞于鹽奔走當事為壓服諸護法之計且繼公曾受托許藏老人嚴統版八百餘塊及攜板至靈巖悉送杭州銷毀未免老人介意因授遺稿有二刻布告十方但此嚴統內前四卷末五卷皆昌治捐資刻成以此推敲進院遲至六月十五方孺對張侗老召認刻還我板因于十三十四日那金購一新做塔樣小而精巧此時河涸止可力蕩復捐工費作料匠人刻字人寫字人一齊入山造成費隱容禪師舍利衣鉢之塔明尊舊住持也車和尚靈骨塔先居東首此塔居西書一扁燈傳處塔成之日適堂中末法老僧不喜老人建塔破口背詈塔成後此僧經行塔院一跌而死豈非天有威靈乎七月造老人像入祖堂東邊置一大扁張侗老題贈光前裕後昌治跋語顏額右曰老人住持金粟十有一祀兩值歉收珠桂維艱鉢盂再弄用飽禪和困而益亨次逢鼎革人心惶惑左右棘荊老人晝夜綏戢內外訓諭漸得平安危而益定戊子出院遍請鹽城紳襟善信及大衆卜請住持百和尚于伽藍神前一聽龍天推出公而益普後住天童住徑山住維摩住福嚴時刻以金粟為念身遠而心益親今尸祝祖堂理固宜然中一間密老人東次間費老人西次間車和尚三位廚像莊嚴煥發治生歡喜心因援筆而賦二聯浼干和尚大書于柱父父子子一條白棒接人天中興濟北宗風兄兄弟弟兩道寄眉掀日月式擴越南法象時千峰息乾示方爾微兩子一孫送像歸家歡敘拈偈畫艇停橈泊佛門高臺三座映乾坤八人賓主襄師事斗室時披肝膽昆釣雪鑑曰金粟為祖宗法窟無論創自赤烏之年其來已久即密老和尚以至于今燈傳薪接亦五十餘年于茲矣住持此席者固難護持此山者更難覲翁以大公無我之心扶滹沱單提之令俾危者安斷者續自非具大願力大手眼曷能始終若此觀辛丑記事之文具悉其婆心苦衷矣歷敘一生艱苦豫大父誥贈資善大夫兵部尚書定溪公生豫父最晚豫父亦以仲兄貴贈官如祖初則蕭然清儉株守士也舉豫時父年三十有六母年三十有七同胞八乳豫第六乳也前兄五間一留一豫與三兄次第相接後又生弟父母以豫適逢間數昕夕憂危者六年訓讀皆口傳未嘗寓目七歲即隨父館于硤石鎮陳嶽雲鄭吉山家課而不督至十二尚未開經或咎太遲父輒嗚咽對云一年未出痘一年不責以成人事及十三見痘父母憂危特甚時值歲荒歉無力延醫遇渴則療以黃連遇瀉則喂以肉果閣家痘殤十三人而豫獨全皆吾父慈念殷殷有格上蒼也十四五時閲文試筆便曉播弄隨父館于浦漾黃九皋家與陸葆老總丱會藝砥礪鼓舞頗稱相愜次年隨二兄館于橫山張紹南家與張睿老朝暮相見睿老尊太孺人極重師傅隆賓客歲時供饌頗豐既而試苦府關幸杜父賞識獎借郡侯得同沈菁老游泮其年跨鳳適遇二兄鄉薦髮妻許克勤克孝克相豫讀無珥可脫無生可謀祇以紡織微資恪供堂上及睹二兄之褒封而後知口腹之承雖歡小孝爾豫意欲成其大者更攻苦罔懈冀就厥志己酉長男乾貞生壬子不與觀場退而結網寒暑弗轍甲寅録科宗師周擊節豫文對七邑讚美不啻舌敝謂是秋定舉高魁而四入浙闈俱遭刖足丁巳次子拱樞生時先人分撥鄉屋豫為欲依膝下供甘旨讓祖房于大兄而卜居于城凡四易市廛始搆室烏龍潭西住之辛酉三兒升貞生襁褓甫三而偶喪上有兩高年下有諸藐孤俯仰俱困睹聞皆慘萬不得已續弦大司空康禧屠公之孫女柔順孝敬視前若出一轍而寬和愛育直泯然于前後際焉是年四兒蒙貞生冬杪先母黃太夫人辭世值三先兄和州柩歸連遭二喪兄弟三人煢煢奉垂暮嚴君者十有四年豫一椽雖搆産止數百小試覺利而大試輒鈍苫塊餘生選刻鑑燦芳摹書旨者無意青紫也庠餼可捨貢銜可考而不即安府倅實不願一生窮經竟登榜外戲場爾二兄備兵漁陽一病幾殞庸醫過表致虛柴蓮老驟補患結豫適到二兄執手流涕口啞不能言豫兩者皆排拜禱于天筮得七日來復勿藥有喜靜伴七日果愈代為料理軍政糧儲者浹月皆當今浙閩總督陳公祖時在道廳一一文移商略批發入都未期輒遇兵困仲季兩兒不候平寧而急返一甫八齡一甫十二豫明為之喪膽為之裂究獲抵家張用僕承值之功沈宗老提挈之德不容泯也邸中楚囚相對者吳石老陳芳老錢貞老楊泰老四人耳辛未二兄量移武德監軍入萊拜巡撫命豫適取道東省方伯勞金老目擊時艱涕泣而談豫忘其為書生而慨焉起澄清天下之志一時知有兄不知有身知有國不知有家舉向來兵家之積弊與目前掩敗之覆轍縷縷指陳歷歷證據南大冢宰謝珍豫疏一字不增減直達睿聽濟南道葉憂豫危豫髮為白冠為挂二兄竟以身殉城豫護兄家眷南還卒得上褒下廕藉此舉也揭并疏附後每見父愁日形于面百般承順終怏怏不樂心口自語安得有繼武者俾冷淡世情不至當吾身而親見豫聞言鼓奮即以誦讀當色養誓不梯榮南國不為順親誓不焚膏刺史不得回天負擔走秣陵入試時主內簾者丁蔣兩老師秉公持正同坐同閲豫房師易六房吳也得豫卷大為踊躍手不停批口不停讚呈送兩師兩師曰機沈養到力厚調古掄元之作急中即此便是天相豫處即此便是豫得天以挽親心處報捷之夜吾父莞爾笑曰癸卯親見二兒浙榜標名癸酉親接四兒南闈報録今而後喜可知矣丙子因居窄復式擴于楊橋之北首菊月父躋九秩子孫家屬以千計稱觴階前陶然樂也交冬漸減飲食豫心憂之不赴公車至丁丑仲月五日坐臥自如忽發暈逾晷醒而取誥命軸交冢孫伯園值伯園侍衛京師呼僮一一展而授之燕語自若恬然而逝豫與大兄哀毀絶粒奈人事雜稠不克雞骨支床勉為哭泣備禮越二載安厝大蒲山之巔遺産四分各受蕩田百畝遺衣悉賚戚友之不給者豫伏而思曰賢父賢祖不得忝列俎豆于心何慊遂殫心力叩諸當事凡三詳三勘論定而後得府縣並祀鄉賢此庚辰三月正五兒頤貞所生月也甲申神京破六月嘉興破八月鹽城亂兵鼓噪府堂一炬登燼延燒鄰房豫家止隔一弄天反風幸而獲免筮得城外西北吉即出北門到朱年兄修老家次日到新行崔寧侯家念三日凡旅泊于豐山間者大半遇害豫鄉居資釜器用舟楫盡失一空十月還城食物用物件件購辦男衣女飾一一不周豫嘆曰巢破偶存復認安居丁散偶聚復珍眷屬口經食貧復圖飽腹真大惑不解之人也庚寅憩郊園適文節教師在梵勝講楞嚴朝往暮返大有會心覺數十載全身護持金粟皆外護非內護猛然心徹宗乘身擔佛法未離世而竊不即世雖居塵而志不染塵灑灑落落笑傲園圃如費老禪師百癡禪師題園韻豫和曰富貴非吾願花鳥聊適觀斗居堪容膝種地不求寬戴笠幾忘暑披裘可禦寒高賢時下榻論古有餘歡九月損資助刻傳燈嚴統五卷辛卯竣業親為之序復蒙費老人以偈與拂親承手授因念肩任之重遂將目前居室所有悉分而給諸後人因著脫家分家二偈此身泊然清淡孑焉赤條所可信者此中曾不壞今更自承當回視得子而教子長而婚四成立者各青其襟三拔貢五肄業太學頗知自勵乾貞娶州守朱葵老女孝廉如日姊也舉孫一秉節豐山罵賊烈死不啻奇男子續配許庶生孫一拱樞娶北兵副郎胡孝老女舉孫一升貞娶陳子老女孝廉子木公繼女也舉孫二許出蒙貞娶孝廉朱迦老女側出孫一屠出頤貞聘癸未進士許元老女庶生孫一李出五姻之費固已不資一生課讀婚嫁居住財用之纍猶可言心情之纍不可言處順境而支撐猶易際逆境而湊泊更難豫苦也哉有此身之為苦今樂也哉無此家之為樂前後若殊觀身世總一視天勞我我奉之天成我我凝之過此以在未之或知附疏稿南京吏部尚書臣謝升等謹題為東事敗壞已極有聞不敢不告伏乞聖明速賜乾斷以救咽喉重地事臣等接得山東巡撫徐從治胞弟徐昌治揭帖為奸辨賣國督師欺君萊危已極拼命直陳事據毛經魁賀允道云係胞兄從治同登萊巡撫謝璉萊州差出眼見督師劉宇烈屢次捷報皆屬欺誑萊必破滅敢冒死陳之胞兄從治初奉監軍命于正月二十五日入萊城二十九日奉巡撫命于二月初一日在彼到任適湊總兵王洪早懷異心與總兵楊御蕃尋釁生非扎營窵遠御蕃血戰洪竟坐視不救以致營兵四五千人一鬨奔逃楊總兵止帶回家丁二百闖進萊城即遭圍困賊架雲梯抬板門儘力攻打城上亦儘力防
